<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quipu — Knowledge Graph Explorer</title>
<link data-trunk rel="css" href="style.css">
<!-- Graphology (data model + algorithms) -->
<script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
<!-- Sigma.js v3 (WebGL rendering) -->
<script src="https://cdn.jsdelivr.net/npm/sigma@3.0.0/build/sigma.min.js"></script>
<!-- Force layout -->
<script src="https://cdn.jsdelivr.net/npm/graphology-layout-forceatlas2@0.10.1/dist/graphology-layout-forceatlas2.min.js"></script>
<!-- CodeMirror 6 (editor core + SPARQL-ish highlighting) -->
<script type="module">
import {EditorView, basicSetup} from "https://cdn.jsdelivr.net/npm/codemirror@6.65.7/+esm";
import {EditorState, Compartment} from "https://cdn.jsdelivr.net/npm/@codemirror/state@6/+esm";
import {keymap} from "https://cdn.jsdelivr.net/npm/@codemirror/view@6/+esm";
import {sql} from "https://cdn.jsdelivr.net/npm/@codemirror/lang-sql@6/+esm";
import {autocompletion} from "https://cdn.jsdelivr.net/npm/@codemirror/autocomplete@6/+esm";
import {linter, lintGutter} from "https://cdn.jsdelivr.net/npm/@codemirror/lint@6/+esm";
import {oneDark} from "https://cdn.jsdelivr.net/npm/@codemirror/theme-one-dark@6/+esm";

// Expose CodeMirror factories to window for WASM interop
window.__cm = {
    EditorView, basicSetup, EditorState, Compartment,
    keymap, sql, autocompletion, linter, lintGutter, oneDark,
};
</script>
<link data-trunk rel="rust" data-wasm-opt="z">
</head>
<body>
<div id="app"></div>
<script>
// Bridge: Rust WASM calls these functions to control Sigma.js
window.__quipu = {
    graph: null,
    renderer: null,
    fa2Layout: null,
    fa2Running: false,

    // Initialize Sigma.js on a container element
    initGraph: function(containerId) {
        const container = document.getElementById(containerId);
        if (!container) { console.error("Container not found:", containerId); return false; }

        this.graph = new graphology.Graph();
        this.renderer = new Sigma(this.graph, container, {
            renderLabels: true,
            labelFont: "'SF Mono', 'Cascadia Code', 'Fira Code', monospace",
            labelSize: 11,
            labelColor: { color: "#e0e0e0" },
            defaultNodeColor: "#8892a4",
            defaultEdgeColor: "#2a2a4a",
            defaultEdgeType: "arrow",
            labelRenderedSizeThreshold: 6,
            nodeProgramClasses: {},
            minCameraRatio: 0.05,
            maxCameraRatio: 10,
        });

        // Wire up click events -> Rust callbacks
        this.renderer.on("clickNode", function(event) {
            if (window.__quipu_on_node_click) {
                window.__quipu_on_node_click(event.node);
            }
        });

        this.renderer.on("doubleClickNode", function(event) {
            event.preventSigmaDefault();
            if (window.__quipu_on_node_dblclick) {
                window.__quipu_on_node_dblclick(event.node);
            }
        });

        this.renderer.on("clickStage", function() {
            if (window.__quipu_on_stage_click) {
                window.__quipu_on_stage_click();
            }
        });

        // Semantic zoom: adjust label detail based on camera ratio
        this.renderer.on("afterRender", function() {
            // Available for future semantic zoom logic
        });

        return true;
    },

    // Add a node to the graph
    addNode: function(id, label, type, x, y) {
        if (this.graph.hasNode(id)) return;
        const colors = {
            "Host": "#4cc9f0",
            "Service": "#4ecca3",
            "Person": "#f7a072",
            "Organization": "#e94560",
            "Event": "#fca311",
            "Place": "#533483",
            "Concept": "#8892a4",
            "diff-added": "#4ecca3",
            "diff-removed": "#e94560",
            "diff-changed": "#fca311",
        };
        this.graph.addNode(id, {
            label: label,
            x: x || Math.random() * 100,
            y: y || Math.random() * 100,
            size: 8,
            color: colors[type] || "#8892a4",
            type: type || "default",
        });
    },

    // Add an edge
    addEdge: function(source, target, label) {
        const key = source + "->" + target + ":" + label;
        if (this.graph.hasEdge(key)) return;
        try {
            this.graph.addEdgeWithKey(key, source, target, {
                label: label,
                size: 1,
                color: "#2a2a4a",
            });
        } catch(e) {
            // source or target may not exist
        }
    },

    // Clear the graph
    clear: function() {
        if (this.graph) this.graph.clear();
    },

    // Run ForceAtlas2 layout
    startLayout: function() {
        if (!this.graph || this.fa2Running) return;
        this.fa2Running = true;
        var self = this;
        var settings = {
            iterations: 100,
            settings: {
                gravity: 1,
                scalingRatio: 2,
                strongGravityMode: true,
                barnesHutOptimize: true,
            }
        };
        // Run synchronously in batches
        forceAtlas2.assign(this.graph, settings);
        this.fa2Running = false;
        if (this.renderer) this.renderer.refresh();
    },

    // Get all node IDs
    getNodeIds: function() {
        if (!this.graph) return "[]";
        return JSON.stringify(this.graph.nodes());
    },

    // Get node attributes
    getNodeAttrs: function(id) {
        if (!this.graph || !this.graph.hasNode(id)) return "{}";
        return JSON.stringify(this.graph.getNodeAttributes(id));
    },

    // Get neighbors
    getNeighbors: function(id) {
        if (!this.graph || !this.graph.hasNode(id)) return "[]";
        return JSON.stringify(this.graph.neighbors(id));
    },

    // Filter nodes by type visibility
    setNodeVisibility: function(nodeId, visible) {
        if (!this.graph || !this.graph.hasNode(nodeId)) return;
        this.graph.setNodeAttribute(nodeId, "hidden", !visible);
        if (this.renderer) this.renderer.refresh();
    },

    // Highlight a node
    highlightNode: function(nodeId) {
        if (!this.graph) return;
        this.graph.forEachNode(function(node, attrs) {
            if (node === nodeId) {
                attrs.highlighted = true;
                attrs.size = 12;
            } else {
                attrs.highlighted = false;
                attrs.size = 8;
            }
        });
        if (this.renderer) this.renderer.refresh();
    },

    // Focus camera on node
    focusNode: function(nodeId) {
        if (!this.renderer || !this.graph || !this.graph.hasNode(nodeId)) return;
        var pos = this.graph.getNodeAttributes(nodeId);
        this.renderer.getCamera().animate(
            { x: pos.x, y: pos.y, ratio: 0.3 },
            { duration: 300 }
        );
    },

    // Get graph stats
    stats: function() {
        if (!this.graph) return JSON.stringify({nodes: 0, edges: 0});
        return JSON.stringify({
            nodes: this.graph.order,
            edges: this.graph.size
        });
    },
};

// ── CodeMirror SPARQL editor bridge ──────────────────────────────
window.__quipu_editor = {
    instance: null,
    completionData: { types: [], predicates: [] },
    onRun: null, // Rust callback for Ctrl+Enter

    init: function(containerId, initialValue, onRunCallback) {
        var self = this;
        self.onRun = onRunCallback;

        // Wait for CM modules to load (they're ESM, may be async)
        function tryInit() {
            if (!window.__cm || !window.__cm.EditorView) {
                setTimeout(tryInit, 50);
                return;
            }
            var cm = window.__cm;

            // SPARQL keyword completions
            var sparqlKeywords = [
                "SELECT", "CONSTRUCT", "DESCRIBE", "ASK", "WHERE", "FILTER",
                "OPTIONAL", "UNION", "BIND", "AS", "GROUP", "BY", "ORDER",
                "HAVING", "LIMIT", "OFFSET", "DISTINCT", "REDUCED", "FROM",
                "NAMED", "PREFIX", "BASE", "VALUES", "MINUS", "SERVICE",
                "EXISTS", "NOT", "IN", "COUNT", "SUM", "AVG", "MIN", "MAX",
                "SAMPLE", "GROUP_CONCAT", "SEPARATOR", "ASC", "DESC",
                "GRAPH", "INSERT", "DELETE", "DATA", "LOAD", "CLEAR",
                "DROP", "CREATE", "COPY", "MOVE", "ADD", "WITH", "USING",
                "a", "true", "false", "BOUND", "IF", "COALESCE", "STR",
                "LANG", "DATATYPE", "IRI", "URI", "BNODE", "RAND", "ABS",
                "CEIL", "FLOOR", "ROUND", "CONCAT", "STRLEN", "UCASE",
                "LCASE", "ENCODE_FOR_URI", "CONTAINS", "STRSTARTS",
                "STRENDS", "STRBEFORE", "STRAFTER", "YEAR", "MONTH",
                "DAY", "HOURS", "MINUTES", "SECONDS", "TIMEZONE", "TZ",
                "NOW", "UUID", "STRUUID", "MD5", "SHA1", "SHA256",
                "SHA384", "SHA512", "isIRI", "isURI", "isBlank",
                "isLiteral", "isNumeric", "REGEX", "REPLACE", "SUBSTR",
            ];

            // Schema-aware completion source
            function sparqlCompletion(context) {
                var word = context.matchBefore(/[\w:<>]+/);
                if (!word) return null;
                var options = [];
                var text = word.text.toLowerCase();

                // Keywords
                sparqlKeywords.forEach(function(kw) {
                    if (kw.toLowerCase().startsWith(text)) {
                        options.push({ label: kw, type: "keyword", boost: 1 });
                    }
                });

                // Entity types from schema
                self.completionData.types.forEach(function(t) {
                    var short = t.split(/[#/]/).pop();
                    if (short.toLowerCase().startsWith(text) || t.toLowerCase().includes(text)) {
                        options.push({ label: "<" + t + ">", displayLabel: short, type: "type", detail: "entity type", boost: 2 });
                    }
                });

                // Predicates from schema
                self.completionData.predicates.forEach(function(p) {
                    var short = p.split(/[#/]/).pop();
                    if (short.toLowerCase().startsWith(text) || p.toLowerCase().includes(text)) {
                        options.push({ label: "<" + p + ">", displayLabel: short, type: "property", detail: "predicate", boost: 2 });
                    }
                });

                if (options.length === 0) return null;
                return { from: word.from, options: options, filter: false };
            }

            var runKeymap = cm.keymap.of([{
                key: "Ctrl-Enter",
                run: function() { if (self.onRun) self.onRun(); return true; },
            }, {
                key: "Cmd-Enter",
                run: function() { if (self.onRun) self.onRun(); return true; },
            }]);

            var container = document.getElementById(containerId);
            if (!container) { console.error("Editor container not found:", containerId); return; }

            var state = cm.EditorState.create({
                doc: initialValue || "",
                extensions: [
                    cm.basicSetup,
                    cm.oneDark,
                    cm.sql(),
                    cm.autocompletion({ override: [sparqlCompletion] }),
                    cm.lintGutter(),
                    runKeymap,
                    cm.EditorView.theme({
                        "&": { fontSize: "13px", fontFamily: "'SF Mono', 'Cascadia Code', 'Fira Code', monospace" },
                        ".cm-content": { padding: "8px 0" },
                        ".cm-gutters": { background: "#16213e", borderRight: "1px solid #2a2a4a" },
                        ".cm-activeLineGutter": { background: "#0f3460" },
                        ".cm-activeLine": { background: "rgba(15, 52, 96, 0.3)" },
                    }),
                    cm.EditorView.updateListener.of(function(update) {
                        // no-op, Rust reads value on demand
                    }),
                ],
            });

            self.instance = new cm.EditorView({ state: state, parent: container });
        }

        tryInit();
    },

    getValue: function() {
        if (!this.instance) return "";
        return this.instance.state.doc.toString();
    },

    setValue: function(text) {
        if (!this.instance) return;
        this.instance.dispatch({
            changes: { from: 0, to: this.instance.state.doc.length, insert: text }
        });
    },

    setCompletionData: function(typesJson, predicatesJson) {
        try {
            this.completionData.types = JSON.parse(typesJson);
            this.completionData.predicates = JSON.parse(predicatesJson);
        } catch(e) { console.error("setCompletionData parse error:", e); }
    },

    setDiagnostics: function(diagnosticsJson) {
        // Future: push lint diagnostics from spargebra validation
        // For now, a stub
    },

    focus: function() {
        if (this.instance) this.instance.focus();
    },
};

// ── Schema graph bridge (separate Sigma.js instance for ontology view) ──
window.__quipu_schema = {
    graph: null,
    renderer: null,

    initGraph: function(containerId) {
        var container = document.getElementById(containerId);
        if (!container) return false;

        this.graph = new graphology.Graph();
        this.renderer = new Sigma(this.graph, container, {
            renderLabels: true,
            labelFont: "'SF Mono', 'Cascadia Code', 'Fira Code', monospace",
            labelSize: 12,
            labelColor: { color: "#e0e0e0" },
            defaultNodeColor: "#8892a4",
            defaultEdgeColor: "#2a2a4a",
            defaultEdgeType: "arrow",
            labelRenderedSizeThreshold: 4,
            minCameraRatio: 0.1,
            maxCameraRatio: 5,
        });

        this.renderer.on("clickNode", function(event) {
            if (window.__quipu_schema_on_node_click) {
                window.__quipu_schema_on_node_click(event.node);
            }
        });

        return true;
    },

    addClassNode: function(id, label, instanceCount) {
        if (!this.graph || this.graph.hasNode(id)) return;
        var size = Math.max(10, Math.min(30, 10 + Math.sqrt(instanceCount) * 3));
        this.graph.addNode(id, {
            label: label + " (" + instanceCount + ")",
            x: Math.random() * 100,
            y: Math.random() * 100,
            size: size,
            color: "#4cc9f0",
            type: "class",
        });
    },

    addDatatypeNode: function(id, label) {
        if (!this.graph || this.graph.hasNode(id)) return;
        this.graph.addNode(id, {
            label: label,
            x: Math.random() * 100,
            y: Math.random() * 100,
            size: 8,
            color: "#fca311",
            type: "datatype",
        });
    },

    addPropertyEdge: function(source, target, label) {
        if (!this.graph) return;
        var key = source + "->" + target + ":" + label;
        if (this.graph.hasEdge(key)) return;
        try {
            this.graph.addEdgeWithKey(key, source, target, {
                label: label,
                size: 1.5,
                color: "#4ecca3",
            });
        } catch(e) {}
    },

    addSubclassEdge: function(child, parent) {
        if (!this.graph) return;
        var key = child + "->subClassOf->" + parent;
        if (this.graph.hasEdge(key)) return;
        try {
            this.graph.addEdgeWithKey(key, child, parent, {
                label: "subClassOf",
                size: 2,
                color: "#e94560",
            });
        } catch(e) {}
    },

    runLayout: function() {
        if (!this.graph) return;
        forceAtlas2.assign(this.graph, {
            iterations: 150,
            settings: { gravity: 2, scalingRatio: 3, strongGravityMode: true, barnesHutOptimize: true }
        });
        if (this.renderer) this.renderer.refresh();
    },

    clear: function() {
        if (this.graph) this.graph.clear();
        if (this.renderer) this.renderer.refresh();
    },
};
</script>
</body>
</html>
